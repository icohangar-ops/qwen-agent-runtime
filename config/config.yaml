# ─── Senso Agent Runtime Configuration ───

llm:
  backup:
    type: "groq"
    api_key: "sk-06b80f4473e24ab8a1725dd373b27e2d"
    model: "deepseek-chat"
    base_url: "https://api.deepseek.com/v1"

agent:
  id: "mac-server"
  role: "primary"

shell: "bash"

limits:
  max_turns: 20
  max_command_length: 2000

guardrails:
  command_whitelist:
    allow:
      - "^ls\\b"
      - "^cat\\b"
      - "^pwd$"
      - "^whoami$"
      - "^hostname$"
      - "^date$"
      - "^uptime$"
      - "^df\\b"
      - "^du\\b"
      - "^ps\\b"
      - "^top\\b"
      - "^free\\b"
      - "^uname\\b"
      - "^which\\b"
      - "^echo\\b"
      - "^head\\b"
      - "^tail\\b"
      - "^grep\\b"
      - "^find\\b"
      - "^wc\\b"
      - "^sort\\b"
      - "^python3?\\b"
      - "^pip3?\\b"
      - "^node\\b"
      - "^npm\\b"
      - "^npx\\b"
      - "^git\\b"
      - "^docker\\b"
      - "^curl\\b"
      - "^wget\\b"
      - "^tree\\b"
      - "^file\\b"
      - "^stat\\b"
      - "^env$"
      - "^crontab\\b"
      - "^systemctl\\b"
    deny:
      - ".*rm\\s+-rf\\s+/"
      - ".*mkfs.*"
      - ".*dd\\s+if=.*"
      - ".*:(){ :|:& };:.*"
  timeouts:
    default_seconds: 30
    max_seconds: 300
    per_command:
      ping: 15
      traceroute: 30
      docker: 120
      pip: 120
      pip3: 120
      npm: 120
      npx: 120
      git: 60
  sanitization:
    strip_patterns:
      - "(?i)password[\\s=:]+['\\\"]?\\S+"
      - "(?i)api[_\\-]?key[\\s=:]+['\\\"]?\\S+"
      - "(?i)token[\\s=:]+['\\\"]?\\S+"
      - "(?i)secret[\\s=:]+['\\\"]?\\S+"
      - "(?i)Bearer\\s+\\S+"
  approval:
    mode: "prompt"
    auto_approve_patterns:
      - "^whoami$"
      - "^hostname$"
      - "^pwd$"
      - "^ls\\s"
      - "^date$"
      - "^uname\\b"

siem:
  enabled: true
  log_file: "logs/audit.jsonl"
  syslog:
    enabled: false
    host: "localhost"
    port: 514
    protocol: "UDP"
